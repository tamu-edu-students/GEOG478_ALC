

<!DOCTYPE html>
<html>
<head>
  <title>Tutorial 1 - Quick Start</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>

  <style>
    #map {
      height: 500px;
    }
  </style>
</head>

<body>

<h2>Quick Start Map</h2>
<div id="map"></div>

 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

<script>
var map = L.map('map').setView([32.3513, -95.3011], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);
var marker = L.marker([32.35, -95.30]).addTo(map);
marker.bindPopup("Marker in Tyler").openPopup();
var circle = L.circle([32.36, -95.31], {
  color: 'red',
  fillColor: '#f03',
  fillOpacity: 0.5,
  radius: 500
}).addTo(map);
circle.bindPopup("Circle area");

var polygon = L.polygon([
  [32.34, -95.32],
  [32.33, -95.28],
  [32.36, -95.27]
]).addTo(map);
polygon.bindPopup("Polygon area");
map.on('click', function(e) {
  alert("You clicked at " + e.latlng);
});
</script>

</body>
</html>
