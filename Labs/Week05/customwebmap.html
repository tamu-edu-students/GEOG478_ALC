<!DOCTYPE html>
<html>
<head>
  <title>Avery Carlyle's First Web Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      height: 100%;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').fitWorld();
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);
map.locate({ setView: true, maxZoom: 16 });

function onLocationFound(e) {
  var radius = e.accuracy / 2;

  L.marker(e.latlng).addTo(map)
    .bindPopup("You are within " + radius + " meters")
    .openPopup();

  L.circle(e.latlng, radius).addTo(map);
}

function onLocationError(e) {
  alert("Location access denied. Default view applied.");
  map.setView([30.6084, -96.3402], 16);
}

map.on('locationfound', onLocationFound);
map.on('locationerror', onLocationError);
var kyleFieldCircle = L.circle([30.6084, -96.3402], {
  color: 'red',
  fillColor: '#f03',
  fillOpacity: 0.5,
  radius: 200
}).addTo(map);

kyleFieldCircle.bindPopup("Kyle Field");
var buildingIcon = L.icon({
  iconUrl: 'https://upload.wikimedia.org/wikipedia/commons/e/ec/RedDot.svg',
  iconSize: [25, 41],      
  iconAnchor: [12, 41],  
  popupAnchor: [1, -34]
});

L.marker([30.6179, -96.3386], { icon: buildingIcon })
  .addTo(map)
  .bindPopup("O&M Building");

L.marker([30.6159, -96.3413], { icon: buildingIcon })
  .addTo(map)
  .bindPopup("Academic Building");

map.on('click', function(e) {
  L.popup()
   .setLatLng(e.latlng)
   .setContent("You clicked at " + e.latlng.toString())
   .openOn(map);
});

</script>
</body>
</html>
