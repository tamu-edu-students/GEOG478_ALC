<!DOCTYPE html>
<html>
<head>
  <title>Tutorial 3 - Custom Icons</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 500px;
    }
  </style>
</head>

<body>
<h2>Custom Icons Map</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([32.3513, -95.3011], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);
var myIcon = L.icon({
  iconUrl: 'https://leafletjs.com/examples/custom-icons/leaf-green.png',
  iconSize: [38, 95],
  iconAnchor: [22, 94],
  popupAnchor: [-3, -76]
});
L.marker([32.35, -95.30], { icon: myIcon })
  .addTo(map)
  .bindPopup("This is a custom icon marker!");
</script>

</body>
</html>
