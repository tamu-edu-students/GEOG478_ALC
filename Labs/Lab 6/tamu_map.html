<!DOCTYPE html>
<html>
<head>
  <title>Avery Carlyle TAMU Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css"
    integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAacEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
    crossorigin=""/>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    #mapid { height: 600px; width: 100%; }
    .info {
      padding: 6px 8px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      pointer-events: none; /* prevents blocking hover */
    }
    .info h4 { margin: 0 0 5px; color: #777; }
  </style>
</head>
<body>
  <h1>Avery Carlyle TAMU Map</h1>
  <div id="mapid"></div>

  <!-- Load TAMU Buildings GeoJSON -->
  <script src="tamubuildings.js"></script>

  <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js"
    integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
    crossorigin=""></script>

  <script>
    // Initialize map
    var map = L.map('mapid').setView([30.6188, -96.3365], 15);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Info control
    var info = L.control();
    info.onAdd = function(map) {
      this._div = L.DomUtil.create('div', 'info');
      this.update();
      return this._div;
    };
    info.update = function(props) {
      if (!props) {
        this._div.innerHTML = '<h4>TAMU Building Info</h4>Hover over a building';
        return;
      }
      // Handle multiple property name possibilities
      var name = props.BldgName || props.bldg_name || "Unknown";
      var abbr = props.BldgAbbr || props.bldg_abbr || "N/A";
      this._div.innerHTML = '<h4>TAMU Building Info</h4><b>' + name + '</b><br>Abbreviation: ' + abbr;
    };
    info.addTo(map);

    // Building style
    function style(feature) {
      return {
        fillColor: '#800000',
        weight: 2,
        opacity: 1,
        color: '#800000',
        dashArray: '3',
        fillOpacity: 0.7
      };
    }

    // Highlight on hover
    function highlightFeature(e) {
      var layer = e.target;
      if (!layer.feature.geometry || (layer.feature.geometry.type !== "Polygon" && layer.feature.geometry.type !== "MultiPolygon")) return;
      layer.setStyle({
        weight: 5,
        color: '#666',
        dashArray: '',
        fillOpacity: 0.9
      });
      layer.bringToFront();
      info.update(layer.feature.properties);
    }

    // Reset highlight
    function resetHighlight(e) {
      buildingsLayer.resetStyle(e.target);
      info.update();
    }

    // Zoom to building on click
    function zoomToFeature(e) {
      map.fitBounds(e.target.getBounds());
    }

    // Attach listeners
    function onEachFeature(feature, layer) {
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight,
        click: zoomToFeature
      });
    }

    // Add GeoJSON layer
    var buildingsLayer = L.geoJSON(tamubuildings, {
      style: style,
      onEachFeature: onEachFeature
    }).addTo(map);

    console.log("Map loaded. Hover over a building to see info!");
  </script>
</body>
</html>
